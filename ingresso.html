<body>

    <h1>Comprar Ingressos</h1>

    <div class="tickets">
        <div class="ticket-card">
            <h2>Inteira</h2>
            <p>R$ 70</p>
            <button onclick="abrirPagamento('Inteira', 70)">Comprar</button>
        </div>
        <div class="ticket-card">
            <h2>Meia</h2>
            <p>R$ 35</p>
            <button onclick="abrirPagamento('Meia', 35)">Comprar</button>
        </div>
        <div class="ticket-card">
            <h2>VIP</h2>
            <p>R$ 120</p>
            <button onclick="abrirPagamento('VIP', 120)">Comprar</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Resumo da Compra</h2>
            <p>Produto: <span id="produto"></span></p>
            <p>Preço: R$ <span id="preco"></span></p>
            <p>Quantidade: <input type="number" id="quantidade" value="1" min="1"></p>
            <p><strong>Total: R$ <span id="total"></span></strong></p>

            <h3>Dados do Cliente</h3>
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="email" id="email" placeholder="Seu E-mail">
            <input type="text" id="pais" placeholder="País">

            <h3>Continente</h3>
            <select id="continente">
                <option value="">Escolher</option>
                <option value="america">América</option>
                <option value="europa">Europa</option>
                <option value="asia">Ásia</option>
                <option value="africa">África</option>
            </select>

            <h3>Pagamento</h3>
            <select id="pagamento"></select>

            <br><br>
            <button onclick="finalizarCompra()" class="btn-finalizar">Finalizar Compra</button>
            <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <script src="pagamento.js"></script>

    <button onclick="ativarLeitor()" id="btnLeitor">
  🔊
</button>

    <script>
    let leitorAtivo = false;
    let ultimoTexto = "";
    let timeout;

    // Ativar / desativar
    function ativarLeitor() {
    leitorAtivo = !leitorAtivo;

    const botao = document.getElementById("btnLeitor");
    botao.innerText = leitorAtivo
        ? "🔇"
        : "🔊";
    }

    // Função de fala
    function falar(texto) {
    if (!texto || texto === ultimoTexto) return;

    ultimoTexto = texto;

    clearTimeout(timeout);
    timeout = setTimeout(() => {
        const fala = new SpeechSynthesisUtterance(texto);
        fala.lang = "pt-BR";
        speechSynthesis.cancel();
        speechSynthesis.speak(fala);
    }, 300); // pequeno atraso pra evitar spam
    }

    // Pegar texto inteligente
    function pegarTexto(el) {
    if (!el) return "";

    return (
        el.getAttribute("aria-label") ||
        el.alt ||
        el.placeholder ||
        el.title ||
        el.innerText
    );
    }

    // Mouse mais preciso
    document.addEventListener("mousemove", function(e) {
    if (!leitorAtivo) return;

    const elemento = document.elementFromPoint(e.clientX, e.clientY);

    if (!elemento) return;

    // Só elementos importantes
    if (elemento.matches("button, a, p, h1, h2, h3, span, img, input, label")) {
        const texto = pegarTexto(elemento);
        falar(texto);
    }
    });

    // Toque no celular
    document.addEventListener("touchstart", function(e) {
    if (!leitorAtivo) return;

    const elemento = e.target;

    if (elemento.matches("button, a, p, h1, h2, h3, span, img, input, label")) {
        const texto = pegarTexto(elemento);
        falar(texto);
    }
    });
    </script>
</body>

</html>
