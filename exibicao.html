<body>

  <button onclick="ativarLeitor()" id="btnLeitor"
    style="position: fixed; bottom: 100px; right: 30px; z-index: 999; background: #ffd54f; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 20px; cursor: pointer;">
    🔊
  </button>

  <!-- NAVBAR -->
  <nav class="navbar-1">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">
      <div class="logo">Legado Mundial</div>

      <button class="menu-toggle d-lg-none" data-bs-toggle="collapse" data-bs-target="#menuExibicao">
        ☰
      </button>

      <ul id="menuExibicao" class="menu collapse d-lg-flex">
        <li><a href="/home/index.html">Início</a></li>
        <li><a href="../exibicao.html">Exibição</a></li>
        <li><a href="../museu.html">Museu</a></li>

          <a href="../ingresso.html">
            <button class="btn-red">Ingressos</button>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container py-5">

    <!-- TÍTULO -->
    <div class="text-center mb-5">
      <h1>SELEÇÕES HISTÓRICAS</h1>
      <p>Explore as maiores seleções da história</p>
    </div>

    <!-- CARDS -->
    <div id="grid" class="cards-grid"></div>

  </main>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span onclick="fecharModal()" class="fechar">✖</span>

      <h2 id="titulo"></h2>
      <p id="historia"></p>
      <p id="cultura"></p>

      <div id="galeria"></div>
    </div>
  </div>

  <!-- ZOOM -->
  <div id="zoom" class="zoom" onclick="fecharZoom()">
    <img>
  </div>

  <script src="exibicao.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="exibicao.js"></script>

  <button onclick="toggleLanguage()" id="btn-translate" class="translate-button">
    EN
  </button>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script>
    // --- LÓGICA DO LEITOR DE TELA ---
    let leitorAtivo = false;
    let ultimoTexto = "";

    function ativarLeitor() {
      leitorAtivo = !leitorAtivo;
      document.getElementById("btnLeitor").innerText = leitorAtivo ? "🔇" : "🔊";
      if (!leitorAtivo) speechSynthesis.cancel();
    }

    function falar(texto) {
      if (!leitorAtivo || !texto || texto === ultimoTexto) return;
      ultimoTexto = texto;
      const fala = new SpeechSynthesisUtterance(texto);
      fala.lang = "pt-BR";
      speechSynthesis.cancel();
      speechSynthesis.speak(fala);
    }

    document.addEventListener("mousemove", (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (el && el.matches("button, a, p, h1, h2, h3, span, img")) {
        falar(el.innerText || el.alt || el.title);
      }
    });

    // --- LÓGICA DO TRADUTOR ---
    let currentLang = "pt";
    function toggleLanguage() {
      currentLang = currentLang === "pt" ? "en" : "pt";
      document.getElementById("btn-translate").innerText = currentLang === "pt" ? "EN" : "PT";
      

      document.querySelectorAll("[data-pt]").forEach(el => {
        el.innerText = el.getAttribute("data-" + currentLang);
      });
    }
  </script>

</body>


</html>
