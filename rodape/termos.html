<script>
        let leitorAtivo = false;
        let ultimoTexto = "";
        let timeout;

        // Ativar / desativar
        function ativarLeitor() {
            leitorAtivo = !leitorAtivo;
            const container = document.getElementById("iconeContainer");

            // Ícones em formato SVG
            const iconSom = '<svg viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.03C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" /></svg>';
            const iconMudo = '<svg viewBox="0 0 24 24"><path d="M12,4L9.91,6.09L12,8.18V4M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.45 16.63,19.82 17.68,18.96L19.73,21L21,19.73L4.27,3M19,12C19,12.94 18.8,13.82 18.46,14.64L19.97,16.15C20.62,14.91 21,13.5 21,12C21,7.72 18,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M16.5,12C16.5,10.23 15.5,8.71 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12Z" /></svg>';

            // Troca o visual
            container.innerHTML = leitorAtivo ? iconMudo : iconSom;

            // Faz ele falar o estado atual
            const aviso = leitorAtivo ? "Leitor ativado" : "Leitor desativado";
            
            // Força a fala do aviso ignorando a trava de "texto repetido"
            ultimoTexto = ""; 
            falar(aviso)
        }
        // Função de fala
        function falar(texto) {
            if (!texto || texto === ultimoTexto) return;

            ultimoTexto = texto;

            clearTimeout(timeout);
            timeout = setTimeout(() => {
                const fala = new SpeechSynthesisUtterance(texto);
                fala.lang = "pt-BR";
                speechSynthesis.cancel();
                speechSynthesis.speak(fala);
            }, 300); // pequeno atraso pra evitar spam
        }
        // Pegar texto inteligente
        function pegarTexto(el) {
            if (!el) return "";

            return (
                el.getAttribute("aria-label") ||
                el.alt ||
                el.placeholder ||
                el.title ||
                el.innerText
            );
        }
        // Mouse mais preciso
        document.addEventListener("mousemove", function (e) {
            if (!leitorAtivo) return;

            const elemento = document.elementFromPoint(e.clientX, e.clientY);

            if (!elemento) return;

            // Só elementos importantes
            if (elemento.matches("button, a, p, h1, h2, h3, span, img, input, label")) {
                const texto = pegarTexto(elemento);
                falar(texto);
            }
        });
        // Toque no celular
        document.addEventListener("touchstart", function (e) {
            if (!leitorAtivo) return;

            const elemento = e.target;

            if (elemento.matches("button, a, p, h1, h2, h3, span, img, input, label")) {
                const texto = pegarTexto(elemento);
                falar(texto);
            }
        });
    </script>

 <script>
let currentLang = "pt";

function toggleLanguage() {
    currentLang = currentLang === "pt" ? "en" : "pt";
    atualizarTextos();
}

function atualizarTextos() {
    const textoBotao = document.getElementById("lang-text");
    
    document.querySelectorAll("[data-pt]").forEach(el => {
        el.innerText = el.getAttribute("data-" + currentLang);
    });

    if(textoBotao) textoBotao.innerText = currentLang.toUpperCase();
}

// 🔥 ISSO FAZ O TEXTO APARECER AO CARREGAR A PÁGINA
document.addEventListener("DOMContentLoaded", atualizarTextos);

    </script>

<script>
function voltarPagina() {
    if (document.referrer) {
        window.history.back();
    } else {
        window.location.href = "/home/index.html";
    }
}
</script>
